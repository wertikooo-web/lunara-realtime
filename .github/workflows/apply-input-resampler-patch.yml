name: Apply input resampler patch

on:
  push:
    branches:
      - feat/server-input-resample-24k-to-16k
    paths:
      - scripts/apply-input-resampler-patch.js
      - .github/workflows/apply-input-resampler-patch.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/server-input-resample-24k-to-16k
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply patch
        run: node scripts/apply-input-resampler-patch.js
      - name: Validate syntax
        run: |
          node --check src/realtime/pcm16Resampler.js
          node --check src/realtime/realtimeServer.js
          node --check scripts/pcm-resampler-smoke.js
      - name: Run resampler smoke test
        run: node scripts/pcm-resampler-smoke.js
      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add server-side 24kHz to 16kHz input resampling"
          git push origin HEAD:feat/server-input-resample-24k-to-16k
